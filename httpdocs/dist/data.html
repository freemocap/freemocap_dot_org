<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="description"
    content="FreeMoCap usage statistics and growth data - see how our free motion capture software is being used worldwide." />
  <meta name="author" content="Jonathan Samir Matthis" />
  <title>Data Dashboard | The FreeMoCap Project</title>

  <!-- Twitter Card -->
  <meta name="twitter:title" content="FreeMoCap Data Dashboard" />
  <meta name="twitter:description"
    content="See FreeMoCap's global reach - usage statistics, growth trends, and user engagement data." />
  <meta name="twitter:image" content="" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Favicon-->
  <link rel="icon" type="image/x-icon" href="./assets/favicons/favicon-black.png" />

  <!-- FORK Awesome icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fork-awesome@1.2.0/css/fork-awesome.min.css"
    integrity="sha256-XoaMnoYC5TH6/+ihMEnospgm0J1PM/nioxbOUdnM8HY=" crossorigin="anonymous" />

  <!-- Bootstrap icons-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Google fonts-->
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Dosis:wght@200;300;400;500;600&family=Roboto:ital,wght@0,300;0,400;1,300;1,400&display=swap"
    rel="stylesheet" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./css/main.css" />

  <style>
    /* Dashboard-specific styles */
    .data-page-wrapper {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding-top: 76px; /* Account for fixed navbar */
    }

    .dashboard-header {
      background: linear-gradient(135deg, #252545 0%, #1a1a2e 100%);
      border-bottom: 1px solid #3a3a5a;
      padding: 1.5rem 0;
    }

    .dashboard-header h1 {
      font-family: 'Dosis', sans-serif;
      font-weight: 600;
      font-size: 2rem;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .dashboard-header p {
      color: #a0a0c0;
      margin-bottom: 0;
    }

    /* Tab Navigation */
    .dashboard-tabs {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
      background: #1f1f35;
      border-bottom: 1px solid #3a3a5a;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.75rem 1.5rem;
      border: 2px solid #4a4a6a;
      border-radius: 8px;
      background: transparent;
      color: #a0a0c0;
      font-family: 'Dosis', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tab-btn:hover {
      border-color: #667eea;
      color: #c0c0e0;
      background: rgba(102, 126, 234, 0.1);
    }

    .tab-btn.active {
      border-color: #d95157;
      background: linear-gradient(135deg, rgba(217, 81, 87, 0.2), rgba(217, 81, 87, 0.05));
      color: #fff;
    }

    .tab-btn i {
      font-size: 1.1rem;
    }

    /* Tab indicator colors */
    .tab-btn[data-tab="growth"].active {
      border-color: #feca57;
      background: linear-gradient(135deg, rgba(254, 202, 87, 0.2), rgba(254, 202, 87, 0.05));
    }

    .tab-btn[data-tab="analytics"].active {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(102, 126, 234, 0.05));
    }

    .tab-btn[data-tab="lifespan"].active {
      border-color: #1dd1a1;
      background: linear-gradient(135deg, rgba(29, 209, 161, 0.2), rgba(29, 209, 161, 0.05));
    }

    /* Iframe Container */
    .dashboard-frame-container {
      position: relative;
      width: 100%;
    }

    .dashboard-frame {
      width: 100%;
      border: none;
      display: none;
    }

    .dashboard-frame.active {
      display: block;
    }

    /* Fixed height for growth animation to prevent growing */
    #frame-growth {
      height: calc(100vh - 250px);
      min-height: 500px;
    }

    /* Auto height for scrollable content */
    #frame-analytics,
    #frame-lifespan {
      min-height: calc(100vh - 250px);
    }

    /* Loading state */
    .frame-loading {
      position: absolute;
      top: 200px;
      left: 50%;
      transform: translateX(-50%);
      color: #a0a0c0;
      font-family: 'Dosis', sans-serif;
      text-align: center;
      z-index: 10;
    }

    .frame-loading.hidden {
      display: none;
    }

    .frame-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #3a3a5a;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer adjustment for dark theme */
    .data-page-wrapper .footer-dark {
      background: #151528;
      border-top: 1px solid #3a3a5a;
      padding: 1.5rem;
    }

    .data-page-wrapper .footer-dark a {
      color: #a0a0c0;
    }

    .data-page-wrapper .footer-dark a:hover {
      color: #d95157;
    }

    .data-page-wrapper .footer-dark p {
      color: #6a6a8a;
      margin: 0;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .dashboard-header h1 {
        font-size: 1.5rem;
      }

      .tab-btn {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }

      .tab-btn span.tab-text {
        display: none;
      }

      #frame-growth {
        height: calc(100vh - 200px);
        min-height: 400px;
      }
    }

    /* Quick stats bar */
    .quick-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.2);
      flex-wrap: wrap;
    }

    .quick-stat {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .quick-stat-value {
      font-family: 'Dosis', sans-serif;
      font-weight: 600;
      font-size: 1.25rem;
      color: #a78bfa;
    }

    .quick-stat-label {
      font-size: 0.75rem;
      color: #6a6a8a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body id="page-top" style="overflow-x: hidden">
  <!-- Header -->
  <div id="header"></div>

  <!-- Main Data Dashboard Wrapper -->
  <div class="data-page-wrapper">
    <!-- Dashboard Header -->
    <div class="dashboard-header text-center">
      <div class="container">
        <h1>🦴 FreeMoCap Data Dashboard</h1>
        <p>Explore how FreeMoCap is being used around the world</p>
      </div>
    </div>

    <!-- Quick Stats Preview -->
    <div class="quick-stats">
      <div class="quick-stat">
        <span class="quick-stat-value" id="qs-users">--</span>
        <span class="quick-stat-label">Users</span>
      </div>
      <div class="quick-stat">
        <span class="quick-stat-value" id="qs-pings">--</span>
        <span class="quick-stat-label">Pings</span>
      </div>
      <div class="quick-stat">
        <span class="quick-stat-value" id="qs-countries">--</span>
        <span class="quick-stat-label">Countries</span>
      </div>
    </div>

    <!-- Tab Navigation - Analytics is first and default -->
    <div class="dashboard-tabs">
      <button class="tab-btn active" data-tab="analytics" onclick="switchTab('analytics')">
        <i class="fa fa-bar-chart"></i>
        <span class="tab-text">Usage Analytics</span>
      </button>
      <button class="tab-btn" data-tab="growth" onclick="switchTab('growth')">
        <i class="fa fa-line-chart"></i>
        <span class="tab-text">Growth Animation</span>
      </button>
      <button class="tab-btn" data-tab="lifespan" onclick="switchTab('lifespan')">
        <i class="fa fa-clock-o"></i>
        <span class="tab-text">User Lifespan</span>
      </button>
    </div>

    <!-- Dashboard Frames -->
    <div class="dashboard-frame-container">
      <div class="frame-loading" id="loading-indicator">
        <div class="spinner"></div>
        <p>Loading dashboard...</p>
      </div>

      <!-- Analytics is first and active by default, lazy loaded -->
      <iframe
        id="frame-analytics"
        class="dashboard-frame active"
        data-src="./data/freemocap_users_analysis.html"
        onload="frameLoaded('analytics')"
      ></iframe>

      <iframe
        id="frame-growth"
        class="dashboard-frame"
        data-src="./data/freemocap_dashboard_animated.html"
        onload="frameLoaded('growth')"
      ></iframe>

      <iframe
        id="frame-lifespan"
        class="dashboard-frame"
        data-src="./data/freemocap_lifespan_analysis.html"
        onload="frameLoaded('lifespan')"
      ></iframe>
    </div>

    <!-- Dark Footer -->
    <footer class="footer-dark text-center">
      <p>
        <a href="mailto:info@freemocap.org">Contact</a> •
        <a href="./about-us.html">About</a> •
        <a href="./about-us.html#donate">Donate <i class="fa fa-heart" style="color: #d95157;"></i></a>
      </p>
      <p style="font-size: 0.75rem; margin-top: 0.5rem;">
        Data collected via anonymous telemetry pings •
        <a href="https://github.com/freemocap/freemocap" target="_blank">View on GitHub</a>
      </p>
    </footer>
  </div>

  <!-- Bootstrap core JS-->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Core theme JS-->
  <script src="./js/scripts.js"></script>
  <!-- Custom JS -->
  <script src="./js/custom.js"></script>

  <script>
    // Track which frames have been loaded
    const loadedFrames = new Set();
    let currentTab = 'analytics';

    // Load an iframe's content (lazy loading)
    function loadFrame(tabName) {
      const frame = document.getElementById(`frame-${tabName}`);
      if (frame && !frame.src && frame.dataset.src) {
        frame.src = frame.dataset.src;
      }
    }

    function switchTab(tabName) {
      // Update buttons
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tabName);
      });

      // Update frames
      document.querySelectorAll('.dashboard-frame').forEach(frame => {
        frame.classList.remove('active');
      });

      const targetFrame = document.getElementById(`frame-${tabName}`);
      if (targetFrame) {
        targetFrame.classList.add('active');
        loadFrame(tabName);
      }

      // Show loading if not yet loaded
      const loadingIndicator = document.getElementById('loading-indicator');
      if (!loadedFrames.has(tabName)) {
        loadingIndicator.classList.remove('hidden');
      } else {
        loadingIndicator.classList.add('hidden');
      }

      currentTab = tabName;

      // Set height for non-growth frames
      if (tabName !== 'growth') {
        setFrameHeight(tabName);
      }
    }

    function frameLoaded(tabName) {
      loadedFrames.add(tabName);

      if (currentTab === tabName) {
        document.getElementById('loading-indicator').classList.add('hidden');
      }

      // Set height for scrollable frames (not growth)
      if (tabName !== 'growth') {
        setFrameHeight(tabName);
      }

      if (tabName === 'analytics' || tabName === 'growth') {
        loadQuickStats();
      }
    }

    // Set frame height based on content (only for analytics and lifespan)
    function setFrameHeight(tabName) {
      if (tabName === 'growth') return; // Growth has fixed CSS height

      const frame = document.getElementById(`frame-${tabName}`);
      if (frame && frame.contentWindow) {
        try {
          const contentHeight = frame.contentWindow.document.body.scrollHeight;
          if (contentHeight > 100) {
            frame.style.height = contentHeight + 'px';
          }
        } catch (e) {
          frame.style.height = '3000px';
        }
      }
    }

    // Load quick stats from JSON
    async function loadQuickStats() {
      try {
        const response = await fetch('./data/freemocap_dashboard_data.json');
        if (response.ok) {
          const data = await response.json();

          const latest = data.time_series[data.time_series.length - 1];

          document.getElementById('qs-users').textContent =
            latest.cumulative_users >= 1000
              ? (latest.cumulative_users / 1000).toFixed(1) + 'K'
              : latest.cumulative_users.toLocaleString();

          document.getElementById('qs-pings').textContent =
            latest.cumulative_records >= 1000000
              ? (latest.cumulative_records / 1000000).toFixed(1) + 'M'
              : latest.cumulative_records >= 1000
                ? (latest.cumulative_records / 1000).toFixed(0) + 'K'
                : latest.cumulative_records.toLocaleString();

          const countries = new Set(data.map_data.map(m => m.country));
          document.getElementById('qs-countries').textContent = countries.size;
        }
      } catch (e) {
        console.log('Could not load quick stats:', e);
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadFrame('analytics');
      loadQuickStats();
    });
  </script>
</body>
</html>
